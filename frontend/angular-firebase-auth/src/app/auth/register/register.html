<div class="auth-page">
   <div class="auth-card">
      <div class="brand">
         <div class="bubble">🧋</div>
         <div>
            <h2>Crear cuenta</h2>
            <p>Regístrate y empieza a saborear BubbleTea.</p>
         </div>
      </div>

      <form class="auth-form" (ngSubmit)="register()">
         <label>
            Email
            <input [(ngModel)]="email" name="email" type="email" autocomplete="username" placeholder="tú@correo.com" />
         </label>

         <label>
            Contraseña
            <input [(ngModel)]="password" name="password" type="password" autocomplete="new-password"
               placeholder="••••••••" />
         </label>

         <label>
            Confirmar contraseña
            <input [(ngModel)]="confirmPassword" name="confirmPassword" type="password" placeholder="••••••••" />
         </label>

         <button type="submit">Registrarme</button>
      </form>

      <p class="error" *ngIf="error">{{ error }}</p>

      <p class="message">
         ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
      </p>
   </div>
</div>
