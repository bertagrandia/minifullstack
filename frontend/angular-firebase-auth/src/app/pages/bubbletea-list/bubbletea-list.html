<div class="page">

   <header>
      <h1>🍵 BubbleTea World</h1>
      <button (click)="logout()">Logout</button>
   </header>

   <div *ngIf="loading" class="loading">
      <p>Cargando bubbleteas...</p>
   </div>

   <div *ngIf="error" class="error">
      <p>{{ error }}</p>
   </div>

   <div class="grid">
      <div class="card" *ngFor="let tea of teas">
         <div class="emoji">🧋</div>

         <h3>{{ tea.name }}</h3>
         <p class="flavor">{{ tea.flavor }}</p>
         <p class="price">{{ tea.price }} €</p>

         <span *ngIf="tea.favorite">⭐ Favorite</span>
      </div>
   </div>

</div>
